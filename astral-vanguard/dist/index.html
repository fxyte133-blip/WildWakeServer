<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111c28" />
    <title>Astral Vanguard</title>
    <script type="module" crossorigin src="/assets/index-a28WfaAp.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Cn_3mVK-.css">
  </head>
  <body>
    <main id="game" aria-label="Astral Vanguard 3D game"></main>
    <section class="hud" aria-label="Player status">
      <div class="meter health">
        <span class="meter-label">HEALTH</span>
        <div class="meter-track"><div id="health-fill" class="meter-fill"></div></div>
        <span class="meter-value">100</span>
      </div>
      <div class="meter stamina">
        <span class="meter-label">STAMINA</span>
        <div class="meter-track"><div id="stamina-fill" class="meter-fill"></div></div>
        <span id="stamina-value" class="meter-value">100</span>
      </div>
      <div id="fps" class="fps">60 FPS</div>
    </section>
    <section class="action-bar" aria-label="Combat abilities">
      <div id="slot-quick" class="ability-slot ready" aria-label="Slot 1 Quick Slash">
        <span class="slot-key">1</span>
        <span class="ability-icon quick" aria-hidden="true"></span>
        <span class="ability-name">QUICK SLASH</span>
        <span class="mouse-hint">LMB</span>
        <span id="quick-cooldown" class="cooldown-time"></span>
        <span id="quick-cooldown-fill" class="cooldown-fill"></span>
      </div>
      <div id="slot-special" class="ability-slot special ready" aria-label="Slot 2 Ground Strike">
        <span class="slot-key">2</span>
        <span class="ability-icon ground" aria-hidden="true"></span>
        <span class="ability-name">GROUND STRIKE</span>
        <span class="mouse-hint">RMB</span>
        <span id="special-cooldown" class="cooldown-time"></span>
        <span id="special-cooldown-fill" class="cooldown-fill"></span>
      </div>
    </section>
    <section id="death-screen" class="death-screen" aria-label="Respawn" hidden>
      <div class="death-card">
        <span class="death-kicker">ASTRAL VANGUARD</span>
        <h2>YOU HAVE FALLEN</h2>
        <button id="respawn-button" type="button">RESPAWN</button>
        <span class="respawn-hint">PRESS ENTER</span>
      </div>
    </section>
    <div class="vignette" aria-hidden="true"></div>
  </body>
</html>
